name: Integrate (CI)

on:
  push:
    branches:
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          coverage: none

      - name: Lint plugin PHP files
        run: |
          find . \
            -path './node_modules' -prune -o \
            -path './vendor' -prune -o \
            -name '*.php' -print0 | xargs -0 -n1 php -l

  plugin-check:
    name: Plugin Check (PCP)
    runs-on: ubuntu-latest
    needs: php-lint
    timeout-minutes: 25
    env:
      WP_ENV_PHP_VERSION: "8.4"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
          cache: composer

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Configure environment versions
        env:
          WP_CORE: "WordPress/WordPress#7.0"
          WC_ZIP: "https://downloads.wordpress.org/plugin/woocommerce.latest-stable.zip"
        run: |
          python3 -c "
          import json, os
          config = {
              'core': os.environ['WP_CORE'],
              'plugins': [os.environ['WC_ZIP'], '.'],
          }
          with open('.wp-env.override.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('Wrote .wp-env.override.json:')
          print(json.dumps(config, indent=2))
          "

      - name: Start WordPress environment
        run: npm run env:start

      - name: Run Plugin Check (PCP)
        run: npm run plugin:check

      - name: Print wp-env logs on failure
        if: failure()
        timeout-minutes: 2
        run: npm run env:logs -- --no-follow || true

      - name: Destroy wp-env environment
        if: always()
        run: npm run env:destroy || true

  integration-tests:
    name: Integration tests (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: php-lint
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - php: "8.1"
            wordpress: "WordPress/WordPress#6.5"
            woocommerce: "https://downloads.wordpress.org/plugin/woocommerce.9.0.0.zip"
            label: "PHP 8.1 / WP 6.5 / WC 9.0.0"
          - php: "8.2"
            wordpress: "WordPress/WordPress#6.8"
            woocommerce: "https://downloads.wordpress.org/plugin/woocommerce.10.6.2.zip"
            label: "PHP 8.2 / WP 6.8 / WC 10.6.2"
          - php: "8.3"
            wordpress: "WordPress/WordPress#6.8"
            woocommerce: "https://downloads.wordpress.org/plugin/woocommerce.10.7.0.zip"
            label: "PHP 8.3 / WP 6.8 / WC 10.7.0"
          - php: "8.4"
            wordpress: "WordPress/WordPress#6.9.4"
            woocommerce: "https://downloads.wordpress.org/plugin/woocommerce.10.8.0.zip"
            label: "PHP 8.4 / WP 6.9 / WC 10.8.0"
          - php: "8.5"
            wordpress: "WordPress/WordPress#6.9.4"
            woocommerce: "https://downloads.wordpress.org/plugin/woocommerce.latest-stable.zip"
            label: "PHP 8.5 / WP 6.9 / WC latest"
          - php: "8.5"
            wordpress: "WordPress/WordPress#7.0"
            woocommerce: "https://downloads.wordpress.org/plugin/woocommerce.latest-stable.zip"
            label: "PHP 8.5 / WP 7 / WC latest"
    env:
      WP_ENV_PHP_VERSION: ${{ matrix.php }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Configure environment versions
        env:
          WP_CORE: ${{ matrix.wordpress }}
          WC_ZIP: ${{ matrix.woocommerce }}
        run: |
          python3 -c "
          import json, os
          config = {
              'core': os.environ['WP_CORE'],
              'plugins': [os.environ['WC_ZIP'], '.'],
          }
          with open('.wp-env.override.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('Wrote .wp-env.override.json:')
          print(json.dumps(config, indent=2))
          "

      - name: Start WordPress environment
        run: npm run env:start

      - name: Run plugin integration tests
        run: npm test

      - name: Print wp-env logs on failure
        if: failure()
        timeout-minutes: 2
        run: npm run env:logs -- --no-follow || true

      - name: Destroy wp-env environment
        if: always()
        run: npm run env:destroy || true
