    ContinentData:
      type: string
      description: Continent derived from a structured-address country code.
      enum:
        - AFRICA
        - ANTARCTICA
        - ASIA
        - EUROPE
        - NORTH_AMERICA
        - OCEANIA
        - SOUTH_AMERICA
      example: EUROPE
    PostShopProductsData:
      type: object
      required:
        - products
      description: >
        Batch of WooCommerce product objects to upsert for a shop.

        Each item in the `products` array is a WooCommerce product payload in the
        WooCommerce REST API v3 format — the same representation sent by live
        WooCommerce product webhooks.
      properties:
        products:
          type: array
          description: >
            Array of WooCommerce product objects in WC REST API v3 format.

            The batch must contain at least one product.
          minItems: 1
          items:
            type: object
            additionalProperties: true
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Cognito JWT token.

        The token is used for authenticating and authorizing users as well as
        personalizing responses.
    PartnerApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        API key for partner shops. Issued to shops that have been granted
        partner status.

        The key must be provided in the `x-api-key` request header.

        This scheme is separate from user authentication (Cognito JWT) and is
        used

        by partner shops for programmatic product ingestion, WooCommerce webhook
        delivery,

        and selected partner-authorized shop operations.
tags:
  - name: Shops
    description: Operations related to shop retrieval and search
